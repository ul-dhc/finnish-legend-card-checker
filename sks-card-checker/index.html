<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKS Finnish Folk Legend Index Card Checker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --app-bg:#FCFAF6;
  --surface:#FFFFFF;
  --surface-2:#F8F4EE;
  --border:#E7DED2;
  --border-soft:#EFE7DD;
  --divider:#E5DBCF;
  --text-1:#1C1B2E;
  --text-2:#3A4358;
  --text-3:#6E746F;
  --focus:#304D8A;
  --focus-tint:rgba(48,77,138,0.08);
  --ok:#4F6B57;
  --ok-light:#BFE3DA;
  --flag:#9E2335;
  --flag-light:#F8D5DC;
  --night:#1C1B2E;
  --img-bg:#3A4358;
  --mono:'Courier New',Courier,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
html,body{height:100%;background:var(--app-bg);}
body{font-family:var(--sans);font-size:13px;color:var(--text-1);-webkit-font-smoothing:antialiased;}

/* TOP RULE */
.top-rule{height:4px;background:linear-gradient(90deg,#304D8A 0%,#9E2335 50%,#1F396C 100%);position:sticky;top:0;z-index:100;}

/* TITLE BAR */
.title-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px 12px;position:sticky;top:4px;z-index:99;}
.title-bar h1{font-size:17px;font-weight:600;color:var(--text-1);letter-spacing:-0.01em;}
.title-bar p{font-size:11.5px;color:var(--text-3);margin-top:2px;}

/* TOOLBAR */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 16px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;position:sticky;top:47px;z-index:98;}
.search-wrap{flex:1;min-width:180px;position:relative;}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;}
#searchInput{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--border);border-radius:7px;font-size:13px;background:var(--surface-2);color:var(--text-1);font-family:var(--sans);outline:none;}
#searchInput:focus{border-color:var(--focus);}
.chip-row{display:flex;gap:6px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:1px;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:11px;color:var(--text-2);cursor:pointer;white-space:nowrap;user-select:none;transition:all .12s;}
.chip:hover{border-color:var(--focus);}
.chip.active{background:var(--focus);border-color:var(--focus);color:#fff;}
.chip .n{opacity:.55;margin-left:3px;}

/* STAT ROW */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);background:var(--border);gap:1px;border-bottom:1px solid var(--border);}
.stat{background:var(--surface);padding:10px 20px;}
.stat-val{font-size:22px;font-weight:500;color:var(--text-1);line-height:1;}
.stat-lbl{font-size:11px;color:var(--text-3);margin-top:3px;}
.stat.ok .stat-val{color:var(--ok);}
.stat.flag .stat-val{color:var(--flag);}
.stat.rem .stat-val{color:var(--focus);}
@media(max-width:600px){
  .stat-val{font-size:16px;}
  .stat{padding:8px 12px;}
}

/* LAYOUT */
.layout{display:grid;grid-template-columns:176px 1fr;min-height:calc(100vh - 200px);}
@media(max-width:760px){.layout{grid-template-columns:1fr;}.sidebar{display:none;}}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);background:var(--surface);padding:14px 0;position:sticky;top:115px;align-self:start;max-height:calc(100vh - 140px);overflow-y:auto;}
.sidebar-sec{padding:0 10px 12px;}
.sidebar-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;font-weight:500;margin-bottom:5px;padding:0 6px;}
.sidebar-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;cursor:pointer;color:var(--text-2);font-size:12px;user-select:none;}
.sidebar-item:hover{background:var(--surface-2);}
.sidebar-item.active{background:var(--focus-tint);color:var(--focus);font-weight:500;}
.sidebar-divider{height:1px;background:var(--divider);margin:4px 10px 8px;}

/* MAIN */
.main-col{padding:14px;display:flex;flex-direction:column;gap:10px;background:var(--app-bg);min-width:0;}
  .main-col.view-list .card{max-width:900px;}
  #cardList.view-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;align-items:start;}
  @media(max-width:900px){#cardList.view-grid{grid-template-columns:1fr;}}
  /* vertical card layout in grid mode */
  #cardList.view-grid .card-body{flex-direction:column;}
  #cardList.view-grid .card-img{width:100%;border-right:none;border-bottom:1px solid var(--border);}
  #cardList.view-grid .card-img-inner{padding:10px;position:static;}
  #cardList.view-grid .card-img img{max-height:180px;width:auto;margin:0 auto;display:block;}
  .layout.grid-mode{grid-template-columns:1fr;}
  .layout.grid-mode .sidebar{display:none;}
.result-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-3);padding:2px 2px 4px;}

/* CARD */
.view-toggle{display:flex;gap:2px;background:var(--surface-2);border:1px solid var(--border);border-radius:7px;padding:3px;flex:none;}
  .vbtn{background:transparent;border:none;padding:5px 8px;border-radius:5px;cursor:pointer;color:var(--text-3);display:flex;align-items:center;justify-content:center;}
  .vbtn.active{background:var(--surface);color:var(--text-1);box-shadow:0 1px 3px rgba(0,0,0,.1);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;border-left:3px solid transparent;}
.card.status-checked{border-left-color:var(--ok);}
.card.status-flagged{border-left-color:var(--flag);}
.card-head{background:var(--surface-2);border-bottom:1px solid var(--border-soft);padding:8px 12px;display:flex;align-items:center;gap:7px;}
.card-num{width:20px;height:20px;background:var(--night);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:600;flex:none;}
.badge{font-size:10px;font-weight:500;padding:3px 8px;border-radius:5px;white-space:nowrap;}
.badge-blue{background:var(--focus-tint);color:var(--focus);}
.badge-ok{background:var(--ok-light);color:var(--ok);}
.badge-flag{background:var(--flag-light);color:var(--flag);}
.card-head-meta{margin-left:auto;font-size:11px;color:var(--text-3);white-space:nowrap;}
.card-body{display:flex;flex-direction:row;}
  @media(max-width:600px){.card-img{width:100px;}}
.card-img{
    width:140px;
    flex:none;
    background:var(--img-bg);
    border-right:1px solid var(--border);
    display:flex;
    align-items:flex-start;
    justify-content:center;
    cursor:zoom-in;
    position:relative;
    align-self:stretch;
  }
  .card-img-inner{
    width:100%;
    padding:8px;
    position:sticky;
    top:8px;
  }
  .card-img img{width:100%;height:auto;display:block;border-radius:3px;max-height:220px;object-fit:contain;}
.card-img .zoom-hint{position:absolute;bottom:6px;right:6px;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.8);font-size:10px;padding:3px 7px;border-radius:12px;font-family:var(--mono);pointer-events:none;}
.card-text{padding:12px;min-width:0;}
.field-label{font-size:10px;color:var(--focus);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:4px;}
.field-label.en{color:#5B5A86;}
.field-fi{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:6px;padding:9px 11px;font-size:13px;color:var(--text-1);line-height:1.55;margin-bottom:10px;white-space:pre-wrap;}
.field-en{font-size:13px;color:var(--text-2);font-style:italic;line-height:1.55;margin-bottom:10px;white-space:pre-wrap;}
.meta-row{display:flex;gap:10px 16px;font-size:11px;color:var(--text-3);border-top:1px dashed var(--divider);padding-top:8px;flex-wrap:wrap;}
.meta-row b{color:var(--text-2);font-weight:500;}
.actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center;}
.action-btn{font-size:12px;padding:6px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .12s;font-family:var(--sans);}
.action-btn:hover{border-color:var(--text-2);}
.action-btn.active-ok{background:var(--ok-light);border-color:var(--ok);color:var(--ok);}
.action-btn.active-flag{background:var(--flag-light);border-color:var(--flag);color:var(--flag);}
.note-toggle{font-size:11.5px;color:var(--text-3);background:none;border:none;cursor:pointer;text-decoration:underline;padding:6px 4px;font-family:var(--sans);}
.note-box{width:100%;margin-top:8px;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-family:var(--sans);font-size:12.5px;resize:vertical;min-height:56px;background:var(--surface-2);display:none;color:var(--text-1);}
.note-box.open{display:block;}
mark{background:#F3E1A0;color:var(--text-1);border-radius:2px;padding:0 1px;}

.no-results{text-align:center;padding:48px 20px;color:var(--text-3);font-size:14px;}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(20,17,12,0.9);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.lightbox.open{display:flex;}
.lightbox img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:4px;}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.12);color:#fff;border:none;width:38px;height:38px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lightbox-caption{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:#e8e0cc;font-family:var(--mono);font-size:11px;background:rgba(0,0,0,0.5);padding:5px 13px;border-radius:16px;white-space:nowrap;}

/* PROGRESS BAR */
.progress-bar{background:var(--night);padding:9px 20px;display:flex;align-items:center;gap:10px;position:sticky;bottom:0;z-index:99;}
.progress-lbl{font-size:11px;color:rgba(255,255,255,.55);white-space:nowrap;font-family:var(--mono);}
.progress-track{flex:1;height:4px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden;display:flex;}
.fill-ok{background:var(--ok-light);height:100%;}
.fill-flag{background:#D4707F;height:100%;}
.reset-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.45);font-size:10px;padding:4px 9px;border-radius:5px;cursor:pointer;font-family:var(--mono);white-space:nowrap;}
.reset-btn:hover{background:rgba(255,255,255,.14);}
</style>
</head>
<body>

<div class="top-rule"></div>

<div class="title-bar">
  <h1>SKS Finnish Folk Legend Index Card Checker</h1>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" id="searchInput" placeholder="Search Finnish, English, places, sources…" autocomplete="off">
  </div>
  <div class="chip-row" id="chipRow"></div>
  <div class="view-toggle">
    <button class="vbtn active" id="btnList" title="List view">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <button class="vbtn" id="btnGrid" title="Grid view">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </button>
  </div>
</div>

<div class="stat-row">
  <div class="stat"><div class="stat-val" id="stat-total">15</div><div class="stat-lbl">Total cards</div></div>
  <div class="stat ok"><div class="stat-val" id="stat-checked">0</div><div class="stat-lbl">Checked</div></div>
  <div class="stat flag"><div class="stat-val" id="stat-flagged">0</div><div class="stat-lbl">Flagged</div></div>
  <div class="stat rem"><div class="stat-val" id="stat-remaining">15</div><div class="stat-lbl">Remaining</div></div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-sec">
      <div class="sidebar-label">Sort by</div>
      <div class="sidebar-item active" data-sort="id">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        Card order
      </div>
      <div class="sidebar-item" data-sort="code">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16"/><polyline points="14 2 14 8 20 8"/></svg>
        TK code
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-sec">
      <div class="sidebar-label">Filter</div>
      <div class="sidebar-item active-filter" data-filter="all">All cards <span style="margin-left:auto;opacity:.5;font-size:11px;">15</span></div>
      <div class="sidebar-item" data-filter="unreviewed">Unreviewed</div>
      <div class="sidebar-item" data-filter="checked">✓ Checked</div>
      <div class="sidebar-item" data-filter="flagged">⚑ Flagged</div>
    </div>
  </div>

  <div class="main-col">
    <div class="result-row">
      <span id="resultCount">Showing 15 of 15</span>
    </div>
    <div id="cardList"></div>
    <div class="no-results" id="noResults" style="display:none;">No cards match your search or filter.</div>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">&times;</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<div class="progress-bar">
  <span class="progress-lbl" id="progressLabel">0 / 15 reviewed</span>
  <div class="progress-track">
    <div class="fill-ok" id="fillChecked" style="width:0%"></div>
    <div class="fill-flag" id="fillFlagged" style="width:0%"></div>
  </div>
  <button class="reset-btn" id="resetProgress">reset review marks</button>
</div>

<script>
const RECORDS = [{"id": 1, "image": "IMG20260612101458.jpg", "fi": "Ylöjärvellä oli piru. Ihmiset läheltä ja kaukaa kävivät sitä katsomassa. Eivät he mitään olentoa nähneet. Mutta jossain torpassa (nimen olen unohtanut) se siellä tanssitti leipiä vartaissa ja aukoi ja sulki ovia sekä helisytti astioita. Sitten se asettui johonkin kallioon ja lauloi aika ajoin sitä virttä: ”Nyt vaivoista vaan kuulla saa. Kaikki itkein parkuin valittaa tuskaansa haikeinta.”", "en": "There was a devil in Ylöjärvi. People came from near and far to look at it. They did not see any being. But in some croft, whose name I have forgotten, it made loaves of bread dance on spits, opened and closed doors, and rattled dishes. Then it settled in some rock and from time to time sang the hymn: ‘Now one hears only of troubles. Everyone laments their keenest anguish with tears and wailing.’", "place": "Sääksmäki, Tyrisevä", "source": "Linda Elomäki TK 10:14. 1961. Heikki Elomäki, pienvilj. 1870-1930", "code": "TK 10:14", "date": "1961", "informant": "", "meta": "Sääksmäki, Tyrisevä. Linda Elomäki TK 10:14. 1961. Heikki Elomäki, pienvilj. 1870-1930."}, {"id": 2, "image": "IMG20260612101902.jpg", "fi": "Lapsuusajaltani muistan täältä kotikylästäni Tyrisevältä erään talon vanhan emännän joka itse uskoi ja ehkä joku naapurikin, että hän pystyy parantamaan konsteillaan. Hän osasi esim. käärmeenpuremaan lorun. Lapsille ei hän sitä opettanut. Taika kai olisi menettänyt mahtinsa, jos sitä olisi turhanpäin tehty.\n\nÄitini kädet puutuivat ja niitä särki. Kyseinen emäntä sanoi: ”Tu sinne meirän saunaan lauantaina! Minä katton sulle veden kiuluun.” Äiti meni, kun ei tahtonut pahoittaa muorin mieltä. Hän sanoi heittäneensä sen veden nurkkaan, kun ei uskonut, että veteen luetuilla loitsuilla oli voimaa.", "en": "From my childhood I remember, here in my home village of Tyrisevä, an old mistress of a house who herself believed, and perhaps some neighbor did too, that she could heal with her methods. For example, she knew a charm for snakebite. She did not teach it to children. The magic would probably have lost its power if it had been done in vain.\n\nMy mother’s hands went numb and ached. The mistress said: ‘Come to our sauna on Saturday! I’ll look at the water for you in the tub.’ Mother went because she did not want to hurt the old woman’s feelings. She said she threw the water into the corner, because she did not believe that charms read over water had any power.", "place": "Sääksmäki, Tyrisevä", "source": "Linda Elomäki TK 10:46. 1961", "code": "TK 10:46", "date": "1961", "informant": "", "meta": "Sääksmäki, Tyrisevä. Linda Elomäki TK 10:46. 1961."}, {"id": 3, "image": "IMG20260612101843.jpg", "fi": "jatk. 1\n\nKottilan talon kaivosta vettä pulloonsa ja taikauskoisena heitti uhrirahan kaivoon. Hän kiiruhti juoksujalkaa kotiinsa Kylmäkoskelle eikä kertonut mistä oli vettä ottanut. Jännittynyt hän oli ”lääkkeen” vaikutuksesta. Mutta lasten suut paranivat. Kottilan kaivon vesi siis tepsi siinä kuin Linnaisten kalliolla olevan taikalähteen vesikin. Se hälvensi vaarini taikauskoa. Mutta vasta vanhana miehenä hän tämän oli rohjennut kertoa lapsilleen. (Tämä tapahtui ehkä 1830-1840)\n\nLinnaisten kallio on Sääksmäen Saarioispuolella lähellä Kuurilan asemaa.", "en": "cont. 1\n\n[He took] water in his bottle from the well of the Kottila house and, being superstitious, threw an offering coin into the well. He hurried home at a run to Kylmäkoski and did not tell where he had taken the water from. He was excited about the effect of the ‘medicine.’ But the children’s mouths healed. So the water from Kottila’s well worked just as well as the water of the magic spring on the Linnaisten rock. This dispelled my grandfather’s superstition. But only as an old man had he dared to tell this to his children. This happened perhaps in 1830–1840.\n\nThe Linnaisten rock is on the Saarioinen side of Sääksmäki near Kuurila station.", "place": "Sääksmäki, Tyrisevä", "source": "Linda Elomäki TK 10:44. 1961. Heikki Elomäki, pienvilj. s. 1870,k. 1930", "code": "TK 10:44", "date": "1961", "informant": "", "meta": "Sääksmäki, Tyrisevä. Linda Elomäki TK 10:44. 1961. Heikki Elomäki, pienvilj. s.1870,k.1930."}, {"id": 4, "image": "IMG20260612101830.jpg", "fi": "Isäni, Heikki Elomäki, on jo kuollut (1930), mutta muistan tämän tosiperäisen hänen kertomansa kaskun.\n\nIsoisäni Karl Enbäck oli 9-vuotias poika ja asui Kylmäkoskella.\n\nSääksmäen Linnaisten kalliolla on lähde, jonka vedellä uskottiin olevan lasten ”sampaita” parantava voima. Vaarini oli lähetetty hakemaan pullolla vettä e.m:sta lähteestä taskussaan lähteeseen pudotettava ”uhriraha.” Päästyään Toijalaan poika tapasi raittilla Toijalan poikia ja rupesi heidän kanssaan lyömään kiekkoa. Vasta iltapäivällä hän muisti millä asialla hän oli. Mutta Linnaisiin on Toijalasta toistakymmentä kilometriä, ja jos poika olisi sinne vielä kävellyt, olisi tullut pimeä, jota 9-vuotias pelkäsi. Neuvokas poika otti keskellä Toijalan kylää olevan jatkuu", "en": "My father, Heikki Elomäki, has already died (1930), but I remember this true anecdote told by him.\n\nMy grandfather Karl Enbäck was a nine-year-old boy and lived in Kylmäkoski.\n\nOn the Linnaisten rock in Sääksmäki there is a spring whose water was believed to have the power to heal children’s ‘teeth.’ My grandfather had been sent to fetch water in a bottle from the above-mentioned spring, with an ‘offering coin’ in his pocket to be dropped into the spring. When he reached Toijala, the boy met boys from Toijala on the road and began playing disk with them. Only in the afternoon did he remember his errand. But Linnaisiin was more than ten kilometers from Toijala, and if the boy had still walked there, it would have grown dark, which a nine-year-old feared. The resourceful boy took [water] from the well in the middle of Toijala village. [continued]", "place": "Sääksmäki, Tyrisevä", "source": "Linda Elomäki TK 10:44. 1961. Heikki Elomäki, pienvilj. s. 1870,k. 1930", "code": "TK 10:44", "date": "1961", "informant": "", "meta": "Sääksmäki, Tyrisevä. Linda Elomäki TK 10:44. 1961. Heikki Elomäki, pienvilj. s.1870,k.1930."}, {"id": 5, "image": "IMG20260612101758.jpg", "fi": "Parittelun synnystä olen kuullut joskus seuraavan jutun:\n\nAatami ja Eeva asuivat vielä kaksistaan maailmaa. Eeva pesi viikunanlehtensä ja valitti, ettei tiedä, mihin panisi sen kuivumaan. Aatami sanoi, että mulla olisi sellainen tanko, johon se lehti sopisi kuivumaan, mutta mihin panisin sen toisen pään. No, Eeva huomasi: ”Mulla on reikä mihin se vapaa pää sopii.” Seisoivat siinä vastakkain pyykkitelineenä. Tuli tuulenpuuska. Aatami horjahti Eevaan päin. Eeva mielistyi: ”Painas vieläkin!” Näin ihminen oppi sen konstin.", "en": "I once heard the following story about the origin of mating:\n\nAdam and Eve still lived alone in the world. Eve washed her fig leaf and complained that she did not know where to put it to dry. Adam said that he had a rod on which the leaf would fit for drying, but where should he put the other end? Well, Eve noticed: ‘I have a hole where the free end fits.’ They stood there facing each other as a clothes rack. A gust of wind came. Adam lurched toward Eve. Eve liked it: ‘Press again!’ That is how people learned the trick.", "place": "Sääksmäki, Tyrisevä", "source": "Linda Elomäki TK 10:35. 1961", "code": "TK 10:35", "date": "1961", "informant": "", "meta": "Sääksmäki, Tyrisevä. Linda Elomäki TK 10:35. 1961."}, {"id": 6, "image": "IMG20260612101441.jpg", "fi": "Tositapaus. Sääksmäen Annilasta varastettiin hevonen laitumelta. Isäntä meni tietäjiin kysymään, missä hevonen on. (Olen unohtanut tietäjän nimen, hän oli isäntä Pälkäneellä) Lähtiessään Annila sanoi: ”Jos mä nyt menen pilkan päiten.” (s.o. leikillään) Meni tietäjiin ja puhui asiansa. ”Pilkan päitenhän sinä tänne tulitkin”, sanoi tietäjä. ”Mutta jos ma ny sanon. Hevoses on lähellä Valkeakoskia päivät tallissa, yöt liakaköyressä mettän [illegible]oisioissa.” Tietäjä neuvo tiänkin niin tarkasti, että Annila osas sen neuvon mukaan hakee hevosensa yöllä kotio.", "en": "A true incident. A horse was stolen from pasture at Annila in Sääksmäki. The master went to a wise person to ask where the horse was. I have forgotten the wise person’s name; he was a farmer in Pälkäne. As Annila left, he said: ‘What if I am going just for fun.’ He went to the wise person and stated his matter. ‘It was just for fun that you came here,’ said the wise person. ‘But if I now say it: your horse is near Valkeakoski, by day in a stable, by night in muddy traces in the forest [illegible].’ The wise person also described the road so precisely that Annila was able, following his advice, to fetch his horse home at night.", "place": "Sääksmäki, Tyrisevä", "source": "Linda Elomäki TK 10:13. 1961. Tilda Seppälä o. s. Annila, emäntä k. 1957 yli 80 v. vanhana", "code": "TK 10:13", "date": "1961", "informant": "", "meta": "Sääksmäki, Tyrisevä. Linda Elomäki TK 10:13. 1961. Tilda Seppälä o.s. Annila, emäntä k. 1957 yli 80 v. vanhana."}, {"id": 7, "image": "IMG20260612101412.jpg", "fi": "Emäntä kävi aina saunassa paran puheilla. Piika tuli uteliaaksi ja päätti ottaa selvän, mitä emäntä saunassa yksinään oikein touhusi. Hän meni saunaan illalla ja pisti itsensä lavon alle piiloon. Pian tuli emäntäkin eikä pimeässä saunassa nähnyt piikaa. Emäntä huusi kiukaan taka: ”Synny para, synny para! Ei o silmää näkemässä eikä korvaa kuulemassa.” Mutta ei para tullut, kun piika oli lavon alla. Kun emäntä ei saanut paraa näkyviin, hän ajatteli, että se on nyt jostain suuttunut. Hän meni pois. Silloin piika tuli lavon alta ja huusi: ”Synny para, synny para! Ei o silmää näkemässä eikä korvaa kuulemassa.” Silloin muurin takaa rupesi tulemaan niin kamala olento, että piika pelästyi ja lähti kiiruusti ovelle. Mennessään hän kuuli paran kysyvän: ”No, mitäs tahrot?” Piika ovesta livahtaessaan huusi hädissään: ”Paskaa!” Ja sitä tuli sauna täyteen.", "en": "The mistress always went to the sauna to speak with the para. The maid became curious and decided to find out what the mistress was doing alone in the sauna. She went to the sauna in the evening and hid under the platform. Soon the mistress came too and, in the dark sauna, did not see the maid. The mistress shouted from behind the stove: ‘Be born, para, be born, para! There is no eye seeing nor ear hearing.’ But the para did not come, because the maid was under the platform. When the mistress could not make the para appear, she thought it must now be angry about something. She went away. Then the maid came out from under the platform and shouted: ‘Be born, para, be born, para! There is no eye seeing nor ear hearing.’ Then from behind the masonry began to come such a terrible creature that the maid was frightened and hurried to the door. As she went, she heard the para ask: ‘Well, what do you want?’ Slipping out the door in panic, the maid shouted: ‘Shit!’ And the sauna became full of it.", "place": "Sääksmäki, Tyrisevä", "source": "Linda Elomäki TK 10:11. 1961. Amanda Elomäki, emäntä 1866-1959", "code": "TK 10:11", "date": "1961", "informant": "", "meta": "Sääksmäki, Tyrisevä. Linda Elomäki TK 10:11. 1961. Amanda Elomäki, emäntä 1866-1959."}, {"id": 8, "image": "IMG20260612101159.jpg", "fi": "Vaikka kuinka pahan hevosen voi kengittää, kun kiertää oikealta vasemmalle kolme kertaa hevosen ympäri ja joka kerta lyö hevosen lautasille kädellään, jonka kämmen on ylöspäin käännetty, sekä joka lyönnillä sanoo\n\nHyvä piru, anna minulle suurempi voima, kuin tuolla järjettömällä luontokappaleella on.\n\nHevosen voimat vähenevät ja se tulee säisyksi, mutta että hevonen tulisi entiselleen, kierretään se jälleen kolmeen kertaan, vaan vasemmalta oikealle ja lyödään lautasille kädellä, jonka kämmen on alaspäin käännetty sekä sanotaan\n\nHyvä puru anna tuolle hevoselle voimansa takaisin”.", "en": "Even the worst horse can be shod if one circles the horse three times from right to left, and each time strikes the horse on the haunches with the palm turned upward, saying with each strike:\n\nGood devil, give me greater strength than that senseless creature has.\n\nThe horse’s strength diminishes and it becomes tame. But for the horse to become as it was before, one circles it again three times, but from left to right, and strikes it on the haunches with the palm turned downward, saying:\n\nGood devil, give that horse its strength back.", "place": "Sääksmäki", "source": "Aalto, K. K. b) 75. 1887", "code": "K.K. b) 75", "date": "1887", "informant": "", "meta": "Sääksmäki. Aalto, K.K. b) 75. 1887."}, {"id": 9, "image": "IMG20260612101522.jpg", "fi": "Mateuslahren Kreeta-Liisa oli kansanparantaja, mutta noita. Maaherrattaren käsi oli kipee. Lääkärit ei saanu paraneen. Hajettiin Mateuslahren KreetaLiisa. (muistaakseni Lempäälässä) Maaherra kysyi: ””Osaakkos noitua?” ”En”. Kreeta-Liisa keitti maan aineista troppinsa ja paransi maaherrattaren. (Samoin monia kansanihmisiä.)", "en": "Kreeta-Liisa of Mateuslahti was a folk healer, but also a witch. The governor’s wife had a sore hand. The doctors could not heal it. Kreeta-Liisa of Mateuslahti was fetched, as I recall from Lempäälä. The governor asked: ‘Can you bewitch?’ ‘No.’ Kreeta-Liisa brewed her medicine from substances of the earth and healed the governor’s wife. She did the same for many ordinary people.", "place": "Sääksmäki, Tyrisevä", "source": "Linda Elomäki TK 10:18. 1961. Amanda Elomäki o. s. Leppälä, emäntä, 1866-1959", "code": "TK 10:18", "date": "1961", "informant": "", "meta": "Sääksmäki, Tyrisevä. Linda Elomäki TK 10:18. 1961. Amanda Elomäki o.s. Leppälä, emäntä, 1866-1959."}, {"id": 10, "image": "IMG20260612101635.jpg", "fi": "Kun Tilda Annila oli kansakoulutyttö Sääksmäen Annilassa, uskottiin voitavan kipuja j.m.s. parantaa noitumalla. Tildan toisen käden sormet ja kämmenen selkä oli täynnä ruuppia. Hänet pantiin menemään erään Huittulan kylässä olevan muijan tykö. Tämä osasi noitua. Tyttö meni ja puhui asiansa. ”Niin kyllä,” sanoi muija, ”muttei ny parane. Ei kuu o ny silälai. Tu toisen kerran!” Ja muija sanoi päivän. Tyttö meni toisteen. Akka otti villalankaa ja solmieli pätkiä ruuppien yläpuolella ja mutisi jotain. Sitten hän antoi langan pätkät tytölle ja sanoi: ”Hautaa ne ny tonne navetan taka sontaläjään. Mutta älä mennessäs katto takas.” Hoidettava teki ninkun käskettiin. Lähti sitten pois ja sanoi, ettei hän edes huomannut, milloin ruupat kädestään parani. (Sillälailla ruupat paraneekin. Niin huomaamatta ne multakin lapsena meni eikä niitä edes noiduttukaan)", "en": "When Tilda Annila was an elementary-school girl at Annila in Sääksmäki, people believed that pains and the like could be cured by witchcraft. The fingers of Tilda’s one hand and the back of her hand were full of scabs. She was sent to a woman in the village of Huittula. This woman knew how to bewitch. The girl went and explained her matter. ‘Yes, indeed,’ said the woman, ‘but it will not heal now. The moon is not right now. Come another time!’ The woman named the day. The girl went again. The old woman took wool yarn and tied pieces above the scabs and muttered something. Then she gave the pieces of yarn to the girl and said: ‘Now bury these back there behind the cowshed in the manure heap. But don’t look back as you go.’ The patient did as she was told. Then she went away and said that she did not even notice when the scabs on her hand healed. (That is how scabs do heal – so unnoticed that mine too disappeared in childhood without even being bewitched.)", "place": "Sääksmäki, Tyrisevä", "source": "Linda Elomäki TK 10:29. 1961. Tilda Seppälä o. s. Annila, kuollut", "code": "TK 10:29", "date": "1961", "informant": "", "meta": "Sääksmäki, Tyrisevä. Linda Elomäki TK 10:29. 1961. Tilda Seppälä o.s. Annila, kuollut."}, {"id": 11, "image": "IMG20260612101649.jpg", "fi": "Kahren talon tontut keskusteli. Toinen sano: ”Minä poltan taloni, poltaks sinä?” Toinen vastas: ”E minä polta. Mutta mitäs sinä sitte talos poltat?” ”Jaa, ei meillä peitetä koskaan valkeen silmiä. Nin minä näytän niille.” (Ei siunattu, kun tehtiin tuli) ”Mutta älä sitä meirän tuaksun taarua polta siältä teirän tiirun taarun korvasta.”\n\n(Oli lainattu jauhosihti ja pantu saavin korvaan eikä oltu palautettu omistajataloon.)", "en": "The household spirits of two houses were talking. One said: ‘I am going to burn my house. Will you burn yours?’ The other answered: ‘I will not burn mine. But why are you going to burn your house?’ ‘Well, in our house the eyes of the fire are never covered. So I will show them.’ (No blessing was made when the fire was lit.) ‘But do not burn our tuaksun taaru from the ear of your tiirun taaru.’\n\nA flour sieve had been borrowed and placed on the rim of a tub, and it had not been returned to the owner’s house.", "place": "Sääksmäki, Tyrisevä", "source": "Linda Elomäki TK 10:26. 1961. Amanda Elomäki o. s. Leppälä, emäntä, 1866-1959", "code": "TK 10:26", "date": "1961", "informant": "", "meta": "Sääksmäki, Tyrisevä. Linda Elomäki TK 10:26. 1961. Amanda Elomäki o.s. Leppälä, emäntä, 1866-1959."}, {"id": 12, "image": "IMG20260612101652.jpg", "fi": "Hämeessä oli kylällä yhteinen paimen, jolle syksyllä maksettiin palkka jyvinä. Evään hän sai kesällä vuorotellen karjanomistajilta. Kitsaimmat talot jättivät joskus paimenen jyvät antamatta. Niin oli käynyt Akaan Kurisjärvelläkin. Menivät sitten Pyhäinpäivänä Kurisjärven ”haltiat” hevosilla kirkkoon ja paimen istui tien vieressä kivellä ja huuteli: ”Kosto tulee! Kosto tulee!” Yks isäntä kylästyneenä huusi: ”No, mistä se ny tulee?” ”Jos ei muusta, nin Mettinkylän paimenen palkasta.” vastas paimen. Ei kurisjärveläisillä ollutkaan kirkossa rauhaa. Kun päästiin kotio, nin lähetettiin paimenelle, mitä hälle kuulu.", "en": "In Häme, a village had a common herdsman, whose wages were paid in grain in the autumn. In the summer he received his food in turn from the owners of the cattle. The stingiest houses sometimes failed to give the herdsman his grain. This had happened at Kurisjärvi in Akaa as well. Then on All Saints’ Day the ‘spirits’ of Kurisjärvi went to church by horse, and the herdsman sat on a stone by the road and called out: ‘Revenge is coming! Revenge is coming!’ One master, annoyed, shouted: ‘Well, where is it coming from now?’ ‘If from nothing else, then from the wages of the herdsman of Mettinkylä,’ answered the herdsman. The people of Kurisjärvi had no peace in church after that. When they got home, they sent the herdsman what was due to him.", "place": "Sääksmäki, Tyrisevä", "source": "Linda Elomäki TK 10:27. 1961. Heikki Elomäki, pienvilj. s. 1870", "code": "TK 10:27", "date": "1961", "informant": "", "meta": "Sääksmäki, Tyrisevä. Linda Elomäki TK 10:27. 1961. Heikki Elomäki, pienvilj. s. 1870."}, {"id": 13, "image": "IMG20260612101716.jpg", "fi": "Joku vähä plikka oli saanu ihoonsa mailuvia ja ne syhy. Koitettiin kaikki kotokeinot, mutta plikan iso vaan paheni. Ei ollu lääkäriä viälä Toijalassa. Mutta oli parantaja, jo vanha muija. Hajettiin se. Sillä oli krouvia suoloja tuokkosessa. Muija vei plikan maakiven päälle ja siinä sualolla pyhkieli niitä mauluvia. Sitten se kokos sualat ja heitti ne tuuleen. Plikka parani.", "en": "A little girl had got skin marks, and they itched. All home remedies were tried, but the girl’s rash only worsened. There was not yet a doctor in Toijala. But there was a healer, already an old woman. She was fetched. She had coarse salts in a birch-bark dish. The woman took the girl onto a boulder and there rubbed the marks with the salt. Then she gathered up the salts and threw them into the wind. The girl recovered.", "place": "Sääksmäki, Tyrisevä", "source": "Linda Elomäki TK 10:28. 1961. Amanda Elomäki o. s. Leppälä, emäntä, 1866-1959", "code": "TK 10:28", "date": "1961", "informant": "", "meta": "Sääksmäki, Tyrisevä. Linda Elomäki TK 10:28. 1961. Amanda Elomäki o.s. Leppälä, emäntä, 1866-1959."}, {"id": 14, "image": "IMG20260612101929.jpg", "fi": "Hauhon kirkon lähellä on suuri kivi jonka jättiläiset on heittänyt Sotjalan kylästä Hiiden kalliolta mutta ei jaksanut sinne saakka vaan putosi lähelle kirkkoa Tuuloksen p. vievän tien viereen jossa nuori tyttö oli pellavia kitkemässä ja jäi kiven alle, josta se on saanut nimensä Neitsyt kivi.", "en": "Near Hauho church there is a large stone which giants threw from the Hiiden rock in the village of Sotjala, but they could not throw it all the way there and it fell near the church beside the road leading to Tuulos parish. A young girl was pulling flax in the field there and was trapped under the stone, from which it got its name, Maiden Stone.", "place": "Sääksmäki", "source": "Hiukkanen, Tilda 4. 1938 < Amanda Estlin, s. 1856", "code": "", "date": "1938", "informant": "", "meta": "Sääksmäki. Hiukkanen, Tilda 4. 1938 < Amanda Estlin, s. 1856."}, {"id": 15, "image": "IMG20260612102024.jpg", "fi": "Linnaisten kalliolla on vuoren alakilla lähde. Pieni reikä sinne laelta johtaa. jos rahaa panet, parantaa vesi taudistasi.", "en": "On Linnaisten rock, on the lower slope of the hill, there is a spring. A small hole leads there from the top. If you put money in, the water cures you of your illness.", "place": "Sääksmäki", "source": "HAKS. Kirsti Aulanko 7690. 1939. < Sirkka Lehtonen, s. 1918", "code": "HAKS. Kirsti Aulanko 7690", "date": "1939", "informant": "", "meta": "Sääksmäki. HAKS. Kirsti Aulanko 7690. 1939. < Sirkka Lehtonen, s. 1918."}];
(function () {
  "use strict";

  var STORAGE_KEY = "saaksmaki_review_v1";
  var state = {
    query: "",
    activeFilter: "all",
    sort: "id",
    status: loadStatus()
  };

  function loadStatus() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }

  function saveStatus() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.status));
    } catch (e) { /* ignore */ }
  }

  function getStatus(id) {
    return state.status[id] || { checked: false, flagged: false, note: "" };
  }

  function setStatus(id, patch) {
    var cur = getStatus(id);
    state.status[id] = Object.assign({}, cur, patch);
    saveStatus();
  }

  // ---------- derive filter chips from data ----------
  function buildChips() {
    var chips = [{ key: "all", label: "All cards", count: RECORDS.length }];

    var unreviewedCount = RECORDS.filter(function (r) { return !getStatus(r.id).checked && !getStatus(r.id).flagged; }).length;
    var checkedCount = RECORDS.filter(function (r) { return getStatus(r.id).checked; }).length;
    var flaggedCount = RECORDS.filter(function (r) { return getStatus(r.id).flagged; }).length;

    chips.push({ key: "unreviewed", label: "Unreviewed", count: unreviewedCount });
    chips.push({ key: "checked", label: "✓ Checked", count: checkedCount });
    chips.push({ key: "flagged", label: "⚑ Flagged", count: flaggedCount });

    return chips;
  }

  function renderChips() {
    var row = document.getElementById("chipRow");
    row.innerHTML = "";
    buildChips().forEach(function (chip) {
      var btn = document.createElement("button");
      btn.className = "chip" + (state.activeFilter === chip.key ? " active" : "");
      btn.innerHTML = chip.label + ' <span class="count">' + chip.count + "</span>";
      btn.addEventListener("click", function () {
        state.activeFilter = (state.activeFilter === chip.key) ? "all" : chip.key;
        renderChips();
        renderCards();
      });
      row.appendChild(btn);
    });
  }

  // ---------- filtering / searching ----------
  function matchesFilter(r) {
    var f = state.activeFilter;
    if (f === "all") return true;
    if (f === "unreviewed") { var s = getStatus(r.id); return !s.checked && !s.flagged; }
    if (f === "checked") return getStatus(r.id).checked;
    if (f === "flagged") return getStatus(r.id).flagged;
    if (f.indexOf("place:") === 0) return (r.place || "Unspecified") === f.slice(6);
    return true;
  }

  function matchesQuery(r, q) {
    if (!q) return true;
    q = q.toLowerCase();
    var hay = [r.fi, r.en, r.place, r.source, r.code, r.date, r.informant, r.meta, r.image]
      .join(" ").toLowerCase();
    return hay.indexOf(q) !== -1;
  }

  function getFiltered() {
    var list = RECORDS.filter(function (r) {
      return matchesFilter(r) && matchesQuery(r, state.query);
    });
    if (state.sort === "code") {
      list = list.slice().sort(function (a, b) {
        return (a.code || "").localeCompare(b.code || "", undefined, { numeric: true });
      });
    } else {
      list = list.slice().sort(function (a, b) { return a.id - b.id; });
    }
    return list;
  }

  // ---------- rendering ----------
  function escapeHtml(str) {
    return String(str || "").replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function highlight(text, q) {
    var escaped = escapeHtml(text);
    if (!q) return escaped;
    try {
      var re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
      return escaped.replace(re, "<mark>$1</mark>");
    } catch (e) {
      return escaped;
    }
  }

  function cardStatusClass(s) {
    if (s.flagged) return "status-flagged";
    if (s.checked) return "status-checked";
    return "";
  }

  function renderCards() {
    var list = getFiltered();
    var container = document.getElementById("cardList");
    var noResults = document.getElementById("noResults");
    var resultCount = document.getElementById("resultCount");

    resultCount.textContent = "Showing " + list.length + " of " + RECORDS.length;

    container.innerHTML = "";
    if (list.length === 0) {
      noResults.style.display = "block";
    } else {
      noResults.style.display = "none";
    }

    list.forEach(function (r) {
      var s = getStatus(r.id);
      var card = document.createElement("article");
      card.className = "card " + cardStatusClass(s);
      card.id = "card-" + r.id;

      var checkedBadge = s.checked ? '<span class="badge badge-ok">&#10003; Checked</span>' : '';
      var flagBadge = s.flagged ? '<span class="badge badge-flag">&#9873; Flagged</span>' : '';
      card.innerHTML =
        '<div class="card-head">' +
          '<span class="card-num">' + r.id + '</span>' +
          (r.code ? '<span class="badge badge-blue">' + escapeHtml(r.code) + '</span>' : '') +
          checkedBadge + flagBadge +
          '<span class="card-head-meta">' + escapeHtml(r.place) + (r.date ? ' &middot; ' + escapeHtml(r.date) : '') + '</span>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="card-img" data-img="images/' + r.image + '" data-cap="' + escapeHtml(r.code || ('Card ' + r.id)) + '">' +
            '<div class="card-img-inner">' +
            '<img src="images/' + r.image + '" alt="Scanned card ' + r.id + '" loading="lazy">' +
            '</div>' +
            '<span class="zoom-hint">tap to zoom</span>' +
          '</div>' +
          '<div class="card-text">' +
            '<div class="field-label">Finnish &mdash; original</div>' +
            '<div class="field-fi">' + highlight(r.fi, state.query) + '</div>' +
            '<div class="field-label en">English translation</div>' +
            '<div class="field-en">' + highlight(r.en, state.query) + '</div>' +
            '<div class="meta-row">' +
              '<span><b>Place:</b> ' + escapeHtml(r.place || '—') + '</span>' +
              '<span><b>Source:</b> ' + escapeHtml(r.source || '—') + '</span>' +
              (r.informant ? '<span><b>Informant:</b> ' + escapeHtml(r.informant) + '</span>' : '') +
            '</div>' +
            '<div class="actions">' +
              '<button class="action-btn' + (s.checked ? ' active-ok' : '') + '" data-action="checked" data-id="' + r.id + '">' + (s.checked ? '&#10003; Checked' : 'Mark checked') + '</button>' +
              '<button class="action-btn' + (s.flagged ? ' active-flag' : '') + '" data-action="flagged" data-id="' + r.id + '">' + (s.flagged ? '&#9873; Flagged' : 'Flag issue') + '</button>' +
              '<button class="note-toggle" data-action="note" data-id="' + r.id + '">' + (s.note ? 'Edit note' : '+ add note') + '</button>' +
            '</div>' +
            '<textarea class="note-box' + (s.note ? ' open' : '') + '" data-id="' + r.id + '" placeholder="e.g. line 3 misread — should be …">' + escapeHtml(s.note) + '</textarea>' +
          '</div>' +
        '</div>';

      container.appendChild(card);
    });

    attachCardHandlers();
    updateProgress();
  }

  function attachCardHandlers() {
    document.querySelectorAll(".action-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-id");
        var action = btn.getAttribute("data-action");
        var cur = getStatus(id);
        if (action === "checked") {
          var nowChecked = !cur.checked;
          setStatus(id, { checked: nowChecked, flagged: nowChecked ? false : cur.flagged });
        } else if (action === "flagged") {
          var nowFlagged = !cur.flagged;
          setStatus(id, { flagged: nowFlagged, checked: nowFlagged ? false : cur.checked });
        }
        renderChips();
        renderCards();
      });
    });

    document.querySelectorAll(".note-toggle").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-id");
        var box = document.querySelector('.note-box[data-id="' + id + '"]');
        box.classList.toggle("open");
        if (box.classList.contains("open")) box.focus();
      });
    });

    document.querySelectorAll(".note-box").forEach(function (box) {
      box.addEventListener("input", function () {
        var id = box.getAttribute("data-id");
        setStatus(id, { note: box.value });
      });
    });

    document.querySelectorAll(".card-img").forEach(function (pane) {
      pane.addEventListener("click", function () {
        openLightbox(pane.getAttribute("data-img"), pane.getAttribute("data-cap"));
      });
    });
  }

  function updateProgress() {
    var total = RECORDS.length;
    var checked = RECORDS.filter(function (r) { return getStatus(r.id).checked; }).length;
    var flagged = RECORDS.filter(function (r) { return getStatus(r.id).flagged; }).length;
    var remaining = total - checked - flagged;

    document.getElementById("stat-total").textContent = total;
    document.getElementById("stat-checked").textContent = checked;
    document.getElementById("stat-flagged").textContent = flagged;
    document.getElementById("stat-remaining").textContent = remaining;

    document.getElementById("progressLabel").textContent = (checked + flagged) + " / " + total + " reviewed";
    document.getElementById("fillChecked").style.width = (checked / total * 100) + "%";
    document.getElementById("fillFlagged").style.width = (flagged / total * 100) + "%";
  }

  // ---------- lightbox ----------
  function openLightbox(src, caption) {
    var lb = document.getElementById("lightbox");
    document.getElementById("lightboxImg").src = src;
    document.getElementById("lightboxCaption").textContent = caption;
    lb.classList.add("open");
  }
  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
  }

  document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
  document.getElementById("lightbox").addEventListener("click", function (e) {
    if (e.target.id === "lightbox") closeLightbox();
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closeLightbox();
  });

  // ---------- search / sort controls ----------
  document.getElementById("searchInput").addEventListener("input", function (e) {
    state.query = e.target.value.trim();
    renderCards();
  });

  document.querySelectorAll(".view-toggle button").forEach(function (btn) {
    btn.addEventListener("click", function () {
      document.querySelectorAll(".view-toggle button").forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
      state.sort = btn.getAttribute("data-sort");
      renderCards();
    });
  });

  document.getElementById("resetProgress").addEventListener("click", function () {
    if (confirm("Clear all checked/flagged marks and notes? This cannot be undone.")) {
      state.status = {};
      saveStatus();
      renderChips();
      renderCards();
    }
  });


  // Sidebar sort
  document.querySelectorAll('.sidebar-item[data-sort]').forEach(function(item) {
    item.addEventListener('click', function() {
      document.querySelectorAll('.sidebar-item[data-sort]').forEach(function(i){i.classList.remove('active');});
      item.classList.add('active');
      state.sort = item.getAttribute('data-sort');
      renderCards();
    });
  });
  // Sidebar filter
  document.querySelectorAll('.sidebar-item[data-filter]').forEach(function(item) {
    item.addEventListener('click', function() {
      document.querySelectorAll('.sidebar-item[data-filter]').forEach(function(i){i.classList.remove('active-filter');});
      item.classList.add('active-filter');
      state.activeFilter = item.getAttribute('data-filter');
      renderChips();
      renderCards();
    });
  });

  // ---------- view toggle ----------
  var mainCol = document.querySelector('.main-col');
  var layoutDiv = document.querySelector('.layout');
  var cardList = document.getElementById('cardList');
  document.getElementById('btnList').addEventListener('click', function() {
    cardList.classList.remove('view-grid');
    layoutDiv.classList.remove('grid-mode');
    document.getElementById('btnList').classList.add('active');
    document.getElementById('btnGrid').classList.remove('active');
  });
  document.getElementById('btnGrid').addEventListener('click', function() {
    cardList.classList.add('view-grid');
    layoutDiv.classList.add('grid-mode');
    document.getElementById('btnGrid').classList.add('active');
    document.getElementById('btnList').classList.remove('active');
  });
  mainCol.classList.add('view-list');

  // ---------- init ----------
  renderChips();
  renderCards();
})();

</script>
</body>
